[project]
site_name = "UPP: Umami Preprocessing"
site_description = "Documentation for the umami preprocessing framework"
site_author = "Umami Team"
site_url = "https://umami-hep.github.io/umami-preprocessing/"

docs_dir = "docs"
site_dir = "site"

repo_name = "GitHub"
repo_url = "https://github.com/umami-hep/umami-preprocessing"
edit_uri = "tree/main/docs"

nav = [
  { "Introduction" = "index.md" },
  { "Setup" = "setup.md" },
  { "Sampling methods" = "sampling.md" },
  { "Reweighting" = "reweighting.md" },
  { "Configuration" = "configuration.md" },
  { "Run" = "run.md" },
  { "Umami integration" = "umami_int.md" },
  { "Contributing" = "contributing.md" },
  { "Docs development" = "docs_development.md" },
]

extra_javascript = [
  "https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML",
]

copyright = "Copyright &copy; 2022 - 2026 CERN for the benefit of the ATLAS collaboration"

[project.theme]
variant = "classic"
features = [
  "content.code.copy",
  "navigation.sections",
  "navigation.top",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.search]

[project.plugins.mkdocstrings.handlers.python]
paths = ["upp"]

[project.plugins.mkdocstrings.handlers.python.options]
line_length = 100
show_root_heading = true
show_root_toc_entry = true
show_root_full_path = true
docstring_style = "numpy"
merge_init_into_class = true
annotations_path = "full"
show_signature = false
members = false

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.toc]
permalink = "#"
