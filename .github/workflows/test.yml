name: tests
concurrency:
  group: ${{ github.workflow }}-${{ startsWith(github.ref, 'refs/tags/') && github.sha || (github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true
on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "main"
    tags:
      - "*"
  workflow_dispatch:

jobs:
  pytest_matrix:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: echo "The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - run: echo "The ${{ github.repository }} repository has been cloned to the runner."
      - name: Install git gnupg python3-tk
        run: sudo apt-get update && sudo apt-get install -y git gnupg python3-tk
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests
        run: uv run pytest -v --junitxml=coverage.xml --cov-report=term-missing:skip-covered --cov=upp tests/
      - name: Report coverage with Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  pytest:
    name: pytest
    needs: [pytest_matrix]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check pytest matrix
        run: |
          if [ "${{ needs.pytest_matrix.result }}" != "success" ]; then
            exit 1
          fi

  publish:
    name: Publish to PyPI
    needs: [pytest]
    runs-on: ubuntu-latest
    # Only run for a tagged commit
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sync environment
        run: uv sync
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
