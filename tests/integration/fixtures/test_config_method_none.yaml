ttbar: &ttbar
  name: ttbar
  pattern: data1.h5
zprime: &zprime
  name: zprime
  pattern: data2.h5

global_cuts:
  train:
    - [pt_btagJes, ">", 0]

  val:
    - [pt_btagJes, ">", 0]

  test:
    - [pt_btagJes, ">", 0]


lowpt: &lowpt
  name: lowpt
  cuts:
    - [pt, ">", 0]
    - [pt, "<", 250_000]

components:
  - region:
      <<: *lowpt
    sample:
      <<: *ttbar
    flavours: [bjets]
    num_global_objects: 1_000

  - region:
      <<: *lowpt
    sample:
      <<: *ttbar
    flavours: [cjets]
    num_global_objects: 2_000

  - region:
      <<: *lowpt
    sample:
      <<: *ttbar
    flavours: [ujets]
    num_global_objects: 3_000

# Resampling explicitly disabled - no target or variables required.
resampling:
  method: none

global:
  batch_size: 10_000
  num_global_objects_estimate: 5_000
  num_global_objects_estimate_norm: 100
  num_global_objects_estimate_available: -1
  base_dir: tmp/upp-tests/integration/temp_workspace/
  out_dir: test_out
  ntuple_dir: ntuples

variables:
  jets:
    inputs:
      - pt_btagJes
      - eta_btagJes
    labels:
      - pt
      - eta
      - mass

  tracks:
    inputs:
      - dphi
      - deta
      - qOverP
    labels:
      - qOverP
